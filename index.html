<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{

html,body{height:100%;background:#111B21;font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;background:var(--bg);position:relative;box-shadow:0 0 40px rgba(0,0,0,.6);overflow:hidden}

#header{background:var(--g-dark);padding:10px 16px 10px 10px;padding-top:max(10px,env(safe-area-inset-top));display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:10}
.back-btn{color:#fff;font-size:22px;cursor:pointer;padding:4px;line-height:1}
.av{width:40px;height:40px;border-radius:50%;background:var(--g-mid);overflow:hidden;flex-shrink:0;cursor:pointer}
.av img{width:100%;height:100%;object-fit:cover}
.hi{flex:1;cursor:pointer}
.hn{color:#fff;font-size:16px;font-weight:600;line-height:1.2}
.hs{color:rgba(255,255,255,.8);font-size:12px;margin-top:1px}
.sdot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--g-light);margin-right:4px;vertical-align:middle;animation:pd 2s infinite}
@keyframes pd{0%,100%{opacity:1}50%{opacity:.3}}
.hic{display:flex;gap:18px;color:rgba(255,255,255,.9);font-size:20px}
.hic span{cursor:pointer}
#messages{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 10px 14px;display:flex;flex-direction:column;gap:2px;position:relative;z-index:1;scroll-behavior:smooth}

#messages::-webkit-scrollbar-thumb{background:rgba(0,0,0,.2);border-radius:2px}
.dsep{align-self:center;background:rgba(255,255,255,.88);color:var(--txt-l);font-size:12px;padding:4px 12px;border-radius:8px;margin:6px 0;box-shadow:0 1px 2px var(--sh)}
.bw{display:flex;flex-direction:column;max-width:83%;animation:fi .22s ease}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.bw.bot{align-self:flex-start}.bw.user{align-self:flex-end}
.bw.user+.bw.bot,.bw.bot+.bw.user{margin-top:8px}
.bw+.bw{margin-top:2px}
.bubble{padding:7px 10px 5px;border-radius:8px;font-size:14.5px;line-height:1.45;color:var(--txt);position:relative;word-break:break-word;box-shadow:0 1px 2px var(--sh)}
.bw.bot .bubble{background:var(--white)}.bw.user .bubble{background:var(--bout)}
.bw.bot.first .bubble{border-top-left-radius:2px}
.bw.bot.first .bubble::before{content:'';position:absolute;top:0;left:-8px;border-width:0 8px 8px 0;border-style:solid;border-color:transparent var(--white) transparent transparent}
.bw.user.first .bubble{border-top-right-radius:2px}
.bw.user.first .bubble::after{content:'';position:absolute;top:0;right:-8px;border-width:0 0 8px 8px;border-style:solid;border-color:transparent transparent transparent var(--bout)}
.bmeta{display:flex;align-items:center;justify-content:flex-end;gap:3px;margin-top:2px;padding-left:40px}
.btime{font-size:11px;color:var(--txt-l)}
.btick{font-size:14px;color:var(--txt-l);line-height:1}
.btick.read{color:var(--tick)}
.vid-wrap{position:relative;border-radius:8px;overflow:hidden;background:#000;width:100%}
.vid-wrap video{display:block;width:100%;max-height:260px;object-fit:contain;border-radius:8px;background:#000}
.vid-label{font-size:12px;color:var(--txt-l);margin-top:4px;text-align:center;font-style:italic}
.vsl-overlay{display:none!important}
.vsl-bar-wrap{width:100%;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin-top:6px;overflow:hidden}
.vsl-bar-fill{height:100%;background:var(--g-light);border-radius:2px;width:0%;transition:width .5s linear}
.vsl-cta{display:none;width:100%;margin-top:10px;padding:11px 16px;background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;border:none;border-radius:24px;font-size:14.5px;font-weight:700;cursor:pointer;text-align:center;transition:transform .1s;box-shadow:0 3px 14px rgba(37,211,102,.4)}
.vsl-cta.show{display:block}

.depo-name{font-size:12.5px;font-weight:600;color:var(--g-dark);margin-top:6px}
.depo-stars{color:#f4c430;font-size:13px;letter-spacing:1px}
.bimg{max-width:100%;border-radius:6px;display:block;max-height:240px;object-fit:cover;cursor:pointer}

.cta-btn{display:block;width:100%;margin-top:11px;padding:12px 16px;background:linear-gradient(135deg,#128C7E,#075E54);color:#fff;border:none;border-radius:24px;font-size:15px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;transition:transform .1s;box-shadow:0 3px 14px rgba(18,140,126,.45);letter-spacing:.3px}
.cta-btn:active{transform:scale(.96)}
.cta-wpp{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:11px;padding:13px 16px;background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;border:none;border-radius:24px;font-size:15px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;transition:transform .1s;box-shadow:0 3px 14px rgba(37,211,102,.45);letter-spacing:.3px}

.cta-wpp svg{width:20px;height:20px;fill:#fff;flex-shrink:0}
#qr{display:flex;flex-wrap:wrap;gap:7px;padding:7px 10px 4px;z-index:2;position:relative}
.qrb{background:var(--white);color:var(--g-mid);border:1.5px solid var(--g-mid);border-radius:20px;padding:7px 14px;font-size:13.5px;font-weight:500;cursor:pointer;transition:background .15s,color .15s;box-shadow:0 1px 3px var(--sh);white-space:nowrap}

#typing{display:none;align-self:flex-start;background:var(--white);border-radius:8px;border-top-left-radius:2px;padding:10px 14px;margin:4px 0 0;box-shadow:0 1px 2px var(--sh);position:relative}

#typing.show{display:flex;gap:4px}
.td{width:8px;height:8px;border-radius:50%;background:var(--txt-l);animation:tb 1.2s infinite}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes tb{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}
.qcard{background:var(--white);border-radius:12px;padding:14px;margin-top:4px;box-shadow:0 2px 8px var(--sh)}
.qprog-lbl{font-size:12px;color:var(--txt-l);margin-bottom:4px}
.qprog-bar{height:5px;background:#e0e0e0;border-radius:3px;overflow:hidden;margin-bottom:12px}
.qprog-fill{height:100%;background:linear-gradient(90deg,var(--g-mid),var(--g-light));border-radius:3px;transition:width .5s ease}
.qq{font-size:14px;font-weight:600;color:var(--txt);margin-bottom:6px;line-height:1.4}
.qq-sub{font-size:12px;color:var(--txt-l);margin-bottom:10px;line-height:1.35;font-style:italic}

.qopt.sel{background:var(--g-mid);border-color:var(--g-mid);color:#fff}

.rcard{background:linear-gradient(135deg,#f0faf8,#e6f7f5);border:1.5px solid #b2dfdb;border-radius:14px;padding:16px;margin-top:4px}
.rtitle{font-size:15px;font-weight:700;color:var(--g-dark);margin-bottom:10px}
.rrow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(0,0,0,.07);font-size:13.5px}

.ui-icon{font-size:15px;flex-shrink:0;margin-top:1px}
.prog-wrap{margin:6px 0 4px}
.prog-lbl{font-size:12px;color:var(--txt-l);margin-bottom:4px}
.prog-bar{height:6px;background:#e0e0e0;border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--g-mid),var(--g-light));border-radius:3px;transition:width .7s ease}
#ibar{display:flex;align-items:flex-end;gap:8px;padding:8px;padding-bottom:max(8px,env(safe-area-inset-bottom));background:var(--ibg);flex-shrink:0;z-index:10;position:relative}
#iwrap{flex:1;display:flex;align-items:flex-end;background:var(--white);border-radius:24px;padding:6px 12px 6px 10px;gap:8px;box-shadow:0 1px 2px var(--sh);min-height:44px}
#emjbtn{font-size:22px;cursor:pointer;color:var(--txt-l);flex-shrink:0;align-self:flex-end;margin-bottom:2px}
#tinput{flex:1;border:none;outline:none;font-family:inherit;font-size:15px;line-height:1.4;color:var(--txt);resize:none;max-height:100px;overflow-y:auto;background:transparent;padding:2px 0}
#tinput::placeholder{color:var(--txt-l)}
#attbtn{font-size:20px;cursor:pointer;color:var(--txt-l);flex-shrink:0;align-self:flex-end;margin-bottom:3px}
#sndbtn{width:46px;height:46px;border-radius:50%;background:var(--g-mid);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 6px rgba(18,140,126,.4);transition:transform .1s}

#sndbtn svg{width:22px;height:22px;fill:#fff}
#finput{display:none}
#attmenu{display:none;position:absolute;bottom:68px;left:14px;background:var(--white);border-radius:14px;box-shadow:0 4px 24px rgba(0,0,0,.18);padding:12px;gap:4px;z-index:20;animation:fi .2s ease}
#attmenu.show{display:flex;flex-direction:column}
.aopt{display:flex;align-items:center;gap:12px;cursor:pointer;padding:8px 12px;border-radius:10px;transition:background .15s}
.aopt:hover{background:var(--ibg)}
.aoic{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.aolbl{font-size:14px;color:var(--txt)}
#lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:100;align-items:center;justify-content:center}

#lb img{max-width:95vw;max-height:90vh;border-radius:6px}
#lbx{position:absolute;top:20px;right:20px;color:#fff;font-size:30px;cursor:pointer;background:rgba(255,255,255,.15);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;z-index:50;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
</style>
</head>

<script>
/* === CONFIG === */
const C = {

  avatar:  "https://metodotripe.shop/wp-content/uploads/2026/04/Screenshot-82.png",
  link:    "#",

    { url:"https://metodotripe.shop/wp-content/uploads/2026/04/DR_VSL-01.mp4", nome:"Roberto S., 52 anos" },
    { url:"https://metodotripe.shop/wp-content/uploads/2026/04/DR_VSL-01.mp4", nome:"Marcos T., 44 anos" },
    { url:"https://metodotripe.shop/wp-content/uploads/2026/04/DR_VSL-01.mp4", nome:"Paulo R., 58 anos" },
  ],
};

/* === QUIZ === */
const QUIZ = [
  { q:"Com que frequência você consegue atingir rigidez TOTAL durante uma relação sexual?", sub:"Esse dado revela seu nível de vascularização peniana", opts:["Quase nunca — fico mole antes de terminar","Raramente — acontece mas é instável","Às vezes — depende do dia","Frequentemente — só falha ocasionalmente","Sempre — sem nenhuma dificuldade"], k:"rigidez" },
  { q:"Você ainda acorda com ereção matinal (o \"sinal de testosterona\")?", sub:"Indicador clínico direto dos seus níveis hormonais", opts:["Nunca — faz muito tempo que não acontece","Raramente — 1 vez por semana ou menos","Quase todos os dias — meu corpo ainda responde bem"], k:"matinal" },
  { q:"Você consegue manter a ereção firme do início ao FIM da relação?", sub:"Esse fator define a eficácia do protocolo para você", opts:["Não — perco antes de terminar com frequência","Às vezes — falha na hora mais crítica","Sim — sem problemas para manter até o fim"], k:"manutencao" },
  { q:"Como está seu desejo sexual nos últimos 3 meses?", sub:"O libido revela o estado atual da sua testosterona livre", opts:["Muito baixo — raramente sinto vontade","Baixo — preciso de muito estímulo","Normal — nada me preocupa muito","Alto — só quero resultados físicos melhores"], k:"libido" },
  { q:"Ser maior e ter mais controle nas relações é uma prioridade REAL para você agora?", sub:"Sua resposta define o plano ideal para o seu perfil", opts:["SIM — quero resolver isso o quanto antes","Sim — mas posso esperar um pouco","Estou apenas pesquisando por agora"], k:"prioridade" },
];

/* === RECEITA === */
function calcReceita(r){
  const grave = ["Quase nunca — fico mole antes de terminar","Raramente — acontece mas é instável"].includes(r.rigidez);
  const semMat = r.matinal === "Nunca — faz muito tempo que não acontece";
  const urgente = r.prioridade === "SIM — quero resolver isso o quanto antes";
  if(grave||semMat) return {bic:"4,5g",agua:"350ml",limao:"1 unidade",mel:"1,5 col. chá",intervalo:"A cada 8h (manhã, tarde e noite)",perfil:"Crítico",prazo:"72 horas"};
  if(urgente)       return {bic:"4,0g",agua:"320ml",limao:"¾ unidade",mel:"1 col. chá",intervalo:"A cada 12h (manhã e noite)",perfil:"Intermediário",prazo:"5 dias"};
  return                   {bic:"3,5g",agua:"300ml",limao:"½ unidade",mel:"1 col. chá",intervalo:"1x ao dia (pela manhã)",perfil:"Preventivo",prazo:"7 a 10 dias"};
}
function gerarCopy(r,rec){
  const probs=[];
  if(["Quase nunca — fico mole antes de terminar","Raramente — acontece mas é instável"].includes(r.rigidez)) probs.push("rigidez comprometida");
  if(r.matinal==="Nunca — faz muito tempo que não acontece") probs.push("ausência de ereção matinal");
  if(r.manutencao==="Não — perco antes de terminar com frequência") probs.push("dificuldade de manutenção");
  if(["Muito baixo — raramente sinto vontade","Baixo — preciso de muito estímulo"].includes(r.libido)) probs.push("libido suprimida");
  if(!probs.length) return `Analisei suas respostas e o seu perfil é de *prevenção e otimização*. ✅\n\nSeu corpo ainda responde bem — mas sem o protocolo certo, a queda vem mais rápido do que você imagina. A fórmula abaixo foi calibrada para manter e elevar o que você já tem. 🔥`;
  return `Analisei suas respostas com atenção. 🔬\n\nIdentifiquei sinais clínicos de:\n${probs.map(p=>`• ${p}`).join('\n')}\n\nIsso não é fraqueza — é bioquímica. A fórmula abaixo foi calibrada *especificamente para o seu perfil ${rec.perfil}* para reativar sua vascularização e produção de testosterona. Os primeiros sinais aparecem em *${rec.prazo}*. 💊`;
}

/* === INTENÇÕES === */
const INTENTS=[
  {k:["o que é","bicarbonato","me explica","conta mais"],r:[`O *Método Bicarbonato* é um protocolo 100% natural que desenvolvi após anos pesquisando a bioquímica hormonal masculina. 🧪\n\nEle usa bicarbonato de sódio estrategicamente para criar o ambiente ideal — desbloqueando a testosterona que o estresse e a idade foram suprimindo.\n\nResultado: mais energia, mais libido, mais performance. 💪`],cta:true},
  {k:["preço","preco","custa","quanto","valor"],r:[`O investimento foi pensado para ser acessível — saúde masculina não pode ser luxo. 💚\n\n⚠️ *O desconto ativo agora é por tempo limitado.*`],cta:true},
  {k:["comprar","quero","garantir","link"],r:[`Decisão certa! 💪\n\nClica no botão — página segura, acesso *imediato* após confirmação! ⬇️`],cta:true},
  {k:["garantia","devolução","risco","reembolso"],r:[`*Garantia total de 7 dias.* 🛡️\n\nSe por qualquer motivo você não ficar satisfeito, devolvo cada centavo. Sem perguntas. 😉`],cta:true},
  {k:["pagamento","pix","boleto","cartão","parcelar"],r:[`💳 Todas as formas:\n\n✅ PIX — acesso *imediato*\n✅ Cartão — até 12x\n✅ Boleto bancário`],cta:true},
  {k:["seguro","efeito colateral","faz mal","perigoso"],r:[`Bicarbonato de sódio é uma das substâncias mais estudadas da medicina. ✅\n\nNas doses certas do protocolo, é seguro para a grande maioria dos homens.\n\n⚠️ Hipertensão severa ou doença renal? Consulte seu médico antes.`],cta:false},
];
const FALLBACKS=[`Pode me perguntar qualquer coisa sobre o *Método Bicarbonato*! 😊`,`Use os botões abaixo ou me escreva sua dúvida. 💚`];

/* === STATE === */
let qStep=0, qResp={}, qAtivo=false;

/* =====================================================
   TIMING HUMANO
   Calcula delay baseado no tamanho do texto + jitter
   ===================================================== */
function humanDelay(text, base=500){
  const len = (text||'').replace(/<[^>]*>/g,'').length;
  // ~38ms por caractere, mín 800ms, máx 3800ms
  const typed = Math.min(600 + len * 38, 3800);
  const jitter = Math.floor(Math.random() * 500) - 250; // ±250ms
  return Math.max(base, typed + jitter);
}

/* === UTILS === */
const $=id=>document.getElementById(id);
const msgEl=$('messages'),typEl=$('typing'),qrEl=$('qr');
const nowT=()=>new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
const rnd=a=>a[Math.floor(Math.random()*a.length)];
const wait=ms=>new Promise(r=>setTimeout(r,ms));
function fmt(t){return t.replace(/\*(.*?)\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');}
function scrollB(){msgEl.scrollTo({top:msgEl.scrollHeight,behavior:'smooth'});}
function showTyp(){typEl.classList.add('show');scrollB();}
function hideTyp(){typEl.classList.remove('show');}
function reinsT(){if(typEl.parentElement===msgEl)msgEl.removeChild(typEl);msgEl.appendChild(typEl);}
function metaEl(type){
  const m=document.createElement('div');m.className='bmeta';
  const t=document.createElement('span');t.className='btime';t.textContent=nowT();m.appendChild(t);
  if(type==='user'){const tk=document.createElement('span');tk.className='btick';tk.innerHTML='✓✓';m.appendChild(tk);setTimeout(()=>tk.classList.add('read'),1500);}
  return m;
}
function fileSz(b){if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';return(b/1048576).toFixed(1)+' MB';}

/* === ADD MESSAGE === */
function addMsg({text,type,first=false,cta=false,ctaWpp=false,video,img,file,quiz,recipe,prog,urgency}){
  reinsT();
  const wrap=document.createElement('div');wrap.className=`bw ${type}${first?' first':''}`;
  const bub=document.createElement('div');bub.className='bubble';
  if(video){
    const vw=document.createElement('div');vw.className='vid-wrap';
    const v=document.createElement('video');v.src=video.url;v.controls=true;v.playsInline=true;v.preload='metadata';
    vw.appendChild(v);
    if(video.vsl){
      // Overlay contador regressivo
      const ov=document.createElement('div');ov.className='vsl-overlay';
      const cdSpan=document.createElement('span');cdSpan.id='vsl-countdown';cdSpan.textContent='Assista: 24s';
      ov.innerHTML='<span>👁️</span>';ov.appendChild(cdSpan);
      vw.appendChild(ov);
      bub.appendChild(vw);
      // Barra de progresso
      const bw=document.createElement('div');bw.className='vsl-bar-wrap';
      const bf=document.createElement('div');bf.className='vsl-bar-fill';bw.appendChild(bf);bub.appendChild(bw);
      // Botão liberado após 24s
      const ctaV=document.createElement('button');ctaV.className='vsl-cta';ctaV.textContent='✅ Assistido! Continuar →';bub.appendChild(ctaV);
      const REQUIRED=24;let watched=0,timer=null,unlocked=false;
      function tick(){
        if(unlocked)return;
        watched=Math.min(watched+1,REQUIRED);
        const rem=REQUIRED-watched;
        cdSpan.textContent=rem>0?'Assista: '+rem+'s':'Liberado! ✅';
        bf.style.width=(watched/REQUIRED*100)+'%';
        if(watched>=REQUIRED&&!unlocked){unlocked=true;ov.classList.remove('show');ctaV.classList.add('show');scrollB();}
      }
      v.addEventListener('play',()=>{ov.classList.add('show');if(!timer)timer=setInterval(tick,1000);});
      v.addEventListener('pause',()=>{clearInterval(timer);timer=null;});
      v.addEventListener('ended',()=>{clearInterval(timer);timer=null;});
      ctaV.addEventListener('click',()=>{if(!unlocked)return;ctaV.disabled=true;ctaV.style.opacity='.6';window._vslResolve&&window._vslResolve();});
    } else {
      bub.appendChild(vw);
      if(video.label){const l=document.createElement('div');l.className='vid-label';l.textContent=video.label;bub.appendChild(l);}
      if(video.nome){const n=document.createElement('div');n.className='depo-name';n.textContent=video.nome;const s=document.createElement('div');s.className='depo-stars';s.textContent='★★★★★';bub.appendChild(n);bub.appendChild(s);}
    }
  }else if(img){
    const i=document.createElement('img');i.className='bimg';i.src=img;i.onclick=()=>openLb(img);bub.appendChild(i);
  }else if(file){
    const f=document.createElement('div');f.className='bfile';
    f.innerHTML=`<span class="ficon">📄</span><div><div class="fname">${file.name}</div><div class="fsize">${fileSz(file.size)}</div></div>`;
    bub.appendChild(f);
  }else if(quiz){
    bub.style.padding='6px';bub.appendChild(buildQuizCard(quiz));
  }else if(recipe){
    bub.style.padding='6px';bub.appendChild(buildRecipe(recipe));
  }else if(urgency){
    bub.style.padding='6px';bub.appendChild(buildUrgency(urgency));
  }else if(prog){
    const pw=document.createElement('div');pw.className='prog-wrap';
    const pl=document.createElement('div');pl.className='prog-lbl';pl.textContent=prog.label;
    const pb=document.createElement('div');pb.className='prog-bar';
    const pf=document.createElement('div');pf.className='prog-fill';pf.style.width='0%';
    pb.appendChild(pf);pw.appendChild(pl);pw.appendChild(pb);bub.appendChild(pw);
    setTimeout(()=>pf.style.width=prog.pct+'%',100);
  }else if(text){
    bub.innerHTML=fmt(text);
  }
  if(cta){const a=document.createElement('a');a.className='cta-btn';a.href=C.link;a.target='_blank';a.rel='noopener';a.innerHTML=`🔥 Quero o ${C.produto} AGORA!`;bub.appendChild(a);}
  if(ctaWpp){const a=document.createElement('a');a.className='cta-wpp';a.href=C.wppLink;a.target='_blank';a.rel='noopener';a.innerHTML=`<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg> Receber minha receita no WhatsApp`;bub.appendChild(a);}
  wrap.appendChild(bub);wrap.appendChild(metaEl(type));
  msgEl.insertBefore(wrap,typEl);scrollB();
  return wrap;
}

/* =====================================================
   botSay — usa humanDelay automaticamente se delay=-1
   ===================================================== */
async function botSay(opts, {delay=-1, first=false}={}){
  const d = delay === -1 ? humanDelay(opts.text||'') : delay;
  showTyp();
  await wait(d);
  hideTyp();
  return addMsg({...opts, type:'bot', first});
}

/* === QR === */
function setQR(btns){qrEl.innerHTML='';for(const b of btns){const el=document.createElement('button');el.className='qrb';el.textContent=b.label;el.onclick=()=>{clearQR();handleUser(b.label,b.v||b.label);};qrEl.appendChild(el);}}
function clearQR(){qrEl.innerHTML='';}

/* === QUIZ CARD === */
function buildQuizCard({q,sub,opts,step}){
  const card=document.createElement('div');card.className='qcard';
  const pl=document.createElement('div');pl.className='qprog-lbl';pl.textContent=`Pergunta ${step} de ${QUIZ.length}`;
  const pb=document.createElement('div');pb.className='qprog-bar';
  const pf=document.createElement('div');pf.className='qprog-fill';pf.style.width=((step-1)/QUIZ.length*100)+'%';
  setTimeout(()=>pf.style.width=(step/QUIZ.length*100)+'%',100);
  pb.appendChild(pf);
  const qq=document.createElement('div');qq.className='qq';qq.textContent=q;
  card.appendChild(pl);card.appendChild(pb);card.appendChild(qq);
  if(sub){const qs=document.createElement('div');qs.className='qq-sub';qs.textContent=sub;card.appendChild(qs);}
  const oo=document.createElement('div');oo.className='qopts';
  for(const o of opts){
    const btn=document.createElement('button');btn.className='qopt';btn.textContent=o;
    btn.addEventListener('click',function(){
      card.querySelectorAll('.qopt').forEach(b=>{b.classList.add('off');});
      btn.classList.remove('off');
      btn.classList.add('sel');
      quizNext(o);
    });
    oo.appendChild(btn);
  }
  card.appendChild(oo);
  return card;
}

/* === RECIPE & URGENCY === */
function buildRecipe(r){
  const card=document.createElement('div');card.className='rcard';
  const t=document.createElement('div');t.className='rtitle';t.innerHTML=`🧪 Sua Receita — Perfil <strong>${r.perfil}</strong>`;
  card.appendChild(t);
  for(const[i,q] of [['Bicarbonato de sódio',r.bic],['Água filtrada',r.agua],['Suco de limão',r.limao],['Mel puro',r.mel],['Frequência das doses',r.intervalo],['Primeiros resultados em',r.prazo]]){
    const row=document.createElement('div');row.className='rrow';row.innerHTML=`<span class="ring">${i}</span><span class="rqty">${q}</span>`;card.appendChild(row);
  }
  const n=document.createElement('div');n.className='rnote';n.textContent='⚠️ Esta fórmula foi calculada para o seu perfil. O protocolo completo com horários exatos, potencializadores e o que NUNCA misturar está no material do Método Bicarbonato.';card.appendChild(n);
  return card;
}
function buildUrgency(items){
  const card=document.createElement('div');card.className='ucard';
  const t=document.createElement('div');t.className='ucard-title';t.innerHTML='⚡ O que você recebe agora:';card.appendChild(t);
  for(const item of items){const row=document.createElement('div');row.className='ucard-item';row.innerHTML=`<span class="ui-icon">${item.icon}</span><span>${item.text}</span>`;card.appendChild(row);}
  return card;
}

/* === QUIZ LOGIC === */
function quizNext(resp){
  qResp[QUIZ[qStep-1].k]=resp;
  addMsg({text:resp,type:'user',first:true});
  if(qStep<QUIZ.length){
    advanceQuiz();
  } else {
    finalizarQuiz();
  }
}

async function advanceQuiz(){
  // Pausa curta — como se estivesse lendo antes de responder
  const acks = ["Anotado! ✅","Entendido 👍","Ok! 😊","Perfeito ⚡","Certo! 👌"];
  await botSay({text:rnd(acks), first:true}, {delay: 900 + Math.random()*500});
  const q=QUIZ[qStep]; qStep++;
  // Pausa maior antes de enviar a próxima pergunta — simula "pensando e digitando"
  await botSay({quiz:{q:q.q,sub:q.sub,opts:q.opts,step:qStep}, first:true}, {delay: 1200 + Math.random()*600});
}

/* waitTap — mostra um botão "continuar" e pausa até o lead clicar */
function waitTap(label='Continuar →'){
  return new Promise(res=>{
    const btn=document.createElement('button');
    btn.className='qrb';
    btn.style.cssText='margin:6px 0 4px 0;padding:9px 20px;font-size:14px;';
    btn.textContent=label;
    qrEl.appendChild(btn);
    scrollB();
    btn.addEventListener('click',()=>{qrEl.innerHTML='';res();},{once:true});
  });
}

async function finalizarQuiz(){
  qAtivo=false;

  // 1. Reação + processamento (automático, sem tap — curto)
  await botSay({text:"Ótimo, obrigado pelas respostas! 🙏", first:true}, {delay:900});
  await botSay({text:"Deixa eu analisar seu perfil aqui... ⚙️", first:false}, {delay:1400});
  await botSay({prog:{label:'Calculando sua fórmula exclusiva...',pct:100}, first:false}, {delay:2200});
  await wait(700);

  // 2. Análise + receita — lead lê e toca para continuar
  const rec=calcReceita(qResp);
  const copy=gerarCopy(qResp,rec);
  await botSay({text:copy, first:true});
  await wait(300);
  await botSay({recipe:rec, first:false}, {delay:1800});
  await waitTap('Li minha receita — continuar 👇');

  // 3. O que falta + card de urgência — lead lê e toca para continuar
  await botSay({
    text:`Essa fórmula é *sua*. Calculada com base nas suas respostas — não é genérica. 🎯\n\nMas a receita sozinha é só o começo. O que transforma resultado em resultado *consistente* é o protocolo completo:\n\n📋 *Horários exatos* de cada dose\n🔥 *Potencializadores* que multiplicam o efeito x3\n🚫 *O que NUNCA misturar* — isso pode anular tudo\n📈 Ajustes progressivos conforme você avança`,
    first:true
  });
  await wait(400);
  await botSay({
    urgency:[
      {icon:'📦',text:'Protocolo completo passo a passo — do dia 1 ao dia 30'},
      {icon:'⏰',text:'Horários exatos para cada dose da sua receita'},
      {icon:'🔒',text:'Acesso vitalício + atualizações gratuitas'},
      {icon:'🛡️',text:'Garantia total de 7 dias — sem perguntas'},
      {icon:'💊',text:'Bônus: Guia de potencializadores naturais'}
    ],
    first:false
  }, {delay:1600});
  await waitTap('Entendi — ver depoimentos 👇');

  // 4. Depoimentos — lead toca para ver cada um
  await botSay({
    text:`Homens com o seu perfil sentiram os primeiros resultados em *${rec.prazo}*. 🔥\n\nOlha o que eles falam com as próprias palavras 👇`,
    first:true
  }, {delay:1600});

  for(let i=0;i<C.depos.length;i++){
    await botSay(
      {video:{url:C.depos[i].url,nome:C.depos[i].nome}, first:i===0},
      {delay: i===0 ? 900 : 600 + Math.random()*300}
    );
    // Após cada depoimento (exceto o último) pede para continuar
    if(i < C.depos.length-1){
      await waitTap('Ver próximo depoimento →');
    }
  }
  await wait(400);

  // 5. CTA final — sem QR buttons, só o botão WhatsApp
  await botSay({
    text:`Resultados *reais*, de homens reais. 💪\n\nSua receita já está pronta. Clica abaixo e eu te mando o protocolo completo direto no seu WhatsApp — com o passo a passo para começar *hoje*. ⬇️`,
    ctaWpp:true,
    first:true
  }, {delay:1800});
}

/* === DEPOIMENTOS (manual) === */
async function mostrarDepos(){
  await botSay({text:"Selecionei aqui alguns depoimentos *reais* de quem já fez o protocolo 👇", first:true}, {delay:1200});
  for(let i=0;i<C.depos.length;i++){
    await botSay(
      {video:{url:C.depos[i].url,nome:C.depos[i].nome}, first:i===0},
      {delay: i===0 ? 900 : 600 + Math.random()*300}
    );
  }
  await botSay({text:"Agora é a sua vez. 💪", ctaWpp:true, first:true}, {delay:1200});
  setQR([{label:"🛒 Garantir meu acesso!",v:"quero comprar agora"},{label:"💰 Ver preço",v:"quanto custa"},{label:"🛡️ Garantia",v:"tem garantia"}]);
}

/* === INTENT === */
function matchIntent(input){
  const n=input.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  let best=null,score=0;
  for(const i of INTENTS){let s=0;for(const kw of i.k){const nk=kw.normalize('NFD').replace(/[\u0300-\u036f]/g,'');if(n.includes(nk))s+=nk.split(' ').length;}if(s>score){score=s;best=i;}}
  return score>0?best:null;
}

/* === HANDLE USER (apenas pós-quiz) === */
async function handleUser(display,value){
  if(qAtivo)return;
  clearQR();
  const v=value||display;
  if(v==='__depos__'){addMsg({text:"Quero ver os depoimentos! 💬",type:'user',first:true});await mostrarDepos();return;}
  addMsg({text:display,type:'user',first:true});
  if(v.toLowerCase().includes('depoiment')){await mostrarDepos();return;}
  const intent=matchIntent(v);
  if(intent){await botSay({text:rnd(intent.r),cta:intent.cta,first:true});}
  else{await botSay({text:rnd(FALLBACKS),first:true});}
  setQR([{label:"💰 Quanto custa?",v:"quanto custa"},{label:"✅ Tem garantia?",v:"tem garantia"},{label:"🛒 Quero comprar!",v:"quero comprar agora"},{label:"💬 Depoimentos",v:"__depos__"}]);
}

/* =====================================================
   WELCOME — fragmentado em mensagens curtas
   como uma pessoa real que digita no zap
   ===================================================== */
async function welcome(){
  // Pausa inicial — parece que a pessoa acaba de abrir o chat
  await wait(800);

  // Mensagem 1 — curtíssima, como um "oi" de verdade
  await botSay({text:"Olá! 👋", first:true}, {delay:700});

  // Mensagem 2 — apresentação, separada da saudação
  await botSay({text:`Sou o *${C.nome}*. 😊`, first:false}, {delay:900});

  // Mensagem 3 — contexto, antes do vídeo
  await botSay({text:"Você chegou no lugar certo.", first:false}, {delay:900});

  // Mensagem 4 — chamada para o vídeo (mensagem separada como pessoa faz no zap)
  await botSay({text:"Antes de qualquer coisa, assiste esse vídeo aqui 👇", first:false}, {delay:1100});

  // Vídeo VSL com bloqueio — fluxo para até o cara apertar "Continuar"
  await botSay({video:{url:C.vsl, vsl:true}, first:false}, {delay:800});
  // Aguarda o clique no botão liberado após 24s
  await new Promise(res=>{ window._vslResolve=res; });
  await wait(600);

  // Mensagem de transição — cria curiosidade antes do quiz
  await botSay({text:"Mais de *4.200 homens* já fizeram esse protocolo. 🔥", first:true}, {delay:1200});

  await botSay({text:"Mas a dose certa varia de pessoa pra pessoa.", first:false}, {delay:1100});

  await botSay({text:"Vou te fazer *5 perguntas rápidas* pra calcular a fórmula ideal pro *seu* perfil. 💊", first:false}, {delay:1400});

  await botSay({text:"Responde com sinceridade — cada resposta muda a receita. 👇", first:false}, {delay:1000});

  // Inicia quiz
  qAtivo=true; qStep=0; qResp={};
  const q=QUIZ[qStep]; qStep++;
  await botSay({quiz:{q:q.q,sub:q.sub,opts:q.opts,step:qStep}, first:true}, {delay:1200});
}

/* === INPUT === */
const ti=$('tinput');
ti.addEventListener('input',()=>{ti.style.height='auto';ti.style.height=Math.min(ti.scrollHeight,100)+'px';const has=ti.value.trim().length>0;$('imic').style.display=has?'none':'block';$('isnd').style.display=has?'block':'none';});
ti.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();}});
$('sndbtn').addEventListener('click',doSend);
function doSend(){const v=ti.value.trim();if(!v||qAtivo)return;ti.value='';ti.style.height='auto';$('imic').style.display='block';$('isnd').style.display='none';handleUser(v);}

/* ATTACH */
const ab=$('attbtn'),am=$('attmenu'),fi=$('finput');
ab.addEventListener('click',e=>{e.stopPropagation();am.classList.toggle('show');});
document.addEventListener('click',()=>am.classList.remove('show'));
$('opt-img').addEventListener('click',()=>{fi.accept='image/*';fi.click();am.classList.remove('show');});
$('opt-file').addEventListener('click',()=>{fi.accept='.pdf,.doc,.docx';fi.click();am.classList.remove('show');});
fi.addEventListener('change',()=>{
  const f=fi.files[0];if(!f)return;
  if(f.type.startsWith('image/')){const r=new FileReader();r.onload=e=>{addMsg({img:e.target.result,type:'user',first:true});fi.value='';setTimeout(async()=>{await botSay({text:"Recebi sua foto! 📸",first:true});},700);};r.readAsDataURL(f);}
  else{addMsg({file:{name:f.name,size:f.size},type:'user',first:true});fi.value='';setTimeout(async()=>{await botSay({text:`Recebi o arquivo *${f.name}*! 📎`,first:true});},700);}
});

/* LIGHTBOX */
function openLb(s){$('lbimg').src=s;$('lb').classList.add('show');}
$('lbx').addEventListener('click',()=>$('lb').classList.remove('show'));
$('lb').addEventListener('click',e=>{if(e.target===$('lb'))$('lb').classList.remove('show');});

/* INIT */
$('hname').textContent=C.nome;
const avimg=$('avimg');avimg.src=C.avatar;avimg.onerror=()=>{avimg.style.display='none';};
welcome();
